name: Feature request
description: Propose a safe, authorized-use SPIDER enhancement.
title: "feat: "
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Features that weaken scope checks, sandboxing, HITL approval, or audit logging will not be accepted. Do not include real target data or secrets.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the desired behavior and safety boundaries.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: textarea
    id: safety
    attributes:
      label: Safety Considerations
      description: How should scope, sandbox, HITL, and audit controls apply?
    validations:
      required: true
